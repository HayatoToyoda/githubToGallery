<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Night field — 3D</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="canvas-wrap" aria-hidden="true"></div>

    <header class="chrome">
      <div class="chrome__dots" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>
      <p class="chrome__title">viewer — night-field@local</p>
      <p class="chrome__badge">cinematic</p>
    </header>

    <main class="overlay">
      <p class="eyebrow">cinematic 3d</p>
      <h1 class="headline">
        夜のフィールド<br />
        実験ログ
      </h1>
      <p class="lede">
        README のヒーロー GIF はこのシーンの録画を想定。視点はゆっくり回転します。手動で動かすときはドラッグ。静止画用は URL に
        <code>?noRotate=1</code>。
      </p>
      <nav class="actions" aria-label="外部リンク">
        <a class="btn" href="https://github.com/" rel="noreferrer">GitHub</a>
        <a class="btn btn--ghost" href="#terminal">ターミナルへ</a>
      </nav>
    </main>

    <section id="terminal" class="terminal" aria-label="ターミナル風ナビ">
      <div class="terminal__bar">
        <span class="terminal__prompt">~</span>
        <span class="terminal__label">zsh — portfolio</span>
      </div>
      <div class="terminal__body">
        <p><span class="cmd">$</span> <span class="kw">cat</span> ./links.txt</p>
        <p class="out">
          <a href="https://github.com/">github.com</a>
          — リポジトリ一覧
        </p>
        <p class="out muted"># README の画像・GIF はリポジトリ直下か .github/ に置くと管理しやすいです</p>
        <p>
          <span class="cmd">$</span> <span class="kw">open</span>
          <a class="link" href="https://pages.github.com/">pages.github.com</a>
        </p>
        <p class="cursor-line"><span class="cursor" aria-hidden="true"></span></p>
      </div>
    </section>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
