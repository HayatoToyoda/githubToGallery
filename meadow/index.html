<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Meadow — コミットで広がる大地</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script>
      window.MEADOW_API_BASE = "https://meadow-auth.toyodahayato05.workers.dev";
    </script>
  </head>
  <body>
    <div id="canvas-wrap" aria-hidden="true"></div>

    <main class="overlay">
      <p class="eyebrow">pop 3d · github</p>
      <h1 class="headline">
        コミットの大地<br />
        草が生える
      </h1>
      <p class="lede">
        <strong>OAuth でログイン</strong>すると、<strong>Contribution Calendar</strong>（過去約1年）に基づいて畑が育ちます（下の Worker URL を設定したとき）。ログインなしでは、<strong>ユーザー名</strong>から公開
        API でコミットを集計します。録画用に視点はゆっくり回転。手動はドラッグ。静止画は
        <code>?noRotate=1</code>。
      </p>
      <form id="gh-form" class="gh-form" action="#" method="get" aria-label="GitHub ユーザーで畑を表示">
        <label class="gh-form__label" for="gh-user">GitHub ユーザー名</label>
        <input
          class="gh-form__input"
          id="gh-user"
          name="user"
          type="text"
          inputmode="text"
          autocomplete="username"
          maxlength="39"
          placeholder="あなたの ID（例: octocat）"
          required
        />
        <label class="gh-form__label" for="gh-repo">リポジトリ（任意・owner/name）</label>
        <input
          class="gh-form__input"
          id="gh-repo"
          name="repo"
          type="text"
          placeholder="省略時は公開リポから自動で選択"
          autocapitalize="off"
          spellcheck="false"
        />
        <button class="gh-form__submit" type="submit">自分の畑を見る</button>
      </form>
      <p id="activity-status" class="activity-status" aria-live="polite"></p>
      <nav class="actions" aria-label="外部リンクと OAuth">
        <a class="btn" href="https://github.com/" rel="noreferrer">GitHub</a>
        <a id="meadow-login" class="btn" href="#" style="display: none">GitHub でログイン（Contribution）</a>
        <a id="meadow-logout" class="btn btn--ghost" href="#" style="display: none">ログアウト</a>
      </nav>
    </main>

    <script>
      (function () {
        var form = document.getElementById("gh-form");
        var userIn = document.getElementById("gh-user");
        var repoIn = document.getElementById("gh-repo");
        var p = new URLSearchParams(window.location.search);
        if (userIn && p.get("user")) userIn.value = p.get("user");
        if (repoIn && p.get("repo")) repoIn.value = p.get("repo");
        try {
          var last = localStorage.getItem("meadow_last_user");
          if (userIn && last && !p.get("user")) userIn.value = last;
        } catch (e) {}
        if (form) {
          form.addEventListener("submit", function (e) {
            e.preventDefault();
            var u = (userIn && userIn.value.trim()) || "";
            var r = (repoIn && repoIn.value.trim()) || "";
            var q = new URLSearchParams();
            if (u) q.set("user", u);
            if (r) q.set("repo", r);
            try {
              if (u) localStorage.setItem("meadow_last_user", u);
            } catch (err) {}
            window.location.search = q.toString();
          });
        }
        var raw = window.MEADOW_API_BASE;
        var api =
          typeof raw === "string" && raw.trim()
            ? raw.replace(/\/$/, "")
            : "";
        if (api) {
          var here = location.href.split("#")[0];
          var login = document.getElementById("meadow-login");
          var logout = document.getElementById("meadow-logout");
          if (login) {
            login.style.display = "inline-flex";
            login.href =
              api + "/auth/github?return_to=" + encodeURIComponent(here);
          }
          if (logout) {
            logout.style.display = "inline-flex";
            logout.href =
              api + "/auth/logout?return_to=" + encodeURIComponent(here);
          }
        }
      })();
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
